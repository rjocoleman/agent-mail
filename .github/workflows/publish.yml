name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  check:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --coverage

      - name: Build
        run: bun run build

  publish:
    name: Publish to JSR
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - run: bunx jsr publish

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$GITHUB_REF_NAME" --jq .body > notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          JSR_URL="https://jsr.io/@rjocoleman/agent-mail@${VERSION}"
          printf 'Published to [JSR](%s)\n\n' "$JSR_URL" | cat - notes.md | \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file - \
              --latest
